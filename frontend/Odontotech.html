<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Odontotech — Sistema de Gestão Odontológica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* density: compact */
    body.compact { font-size: 13px; }
    body.compact .page { padding: 22px 26px 50px; }
    body.compact .card-pad { padding: 16px; }
    body.compact .card-body { padding: 16px; }
    body.compact .btn { height: 35px; }
    body.compact .stat { padding: 15px; }
    body.compact .stat-value { font-size: 24px; }
    body.compact table.tbl tbody td { padding: 10px 14px; }
    body.compact .cal-cell { min-height: 100px; }
    @media (max-width: 920px) {
      .hide-collapse { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- plain data + API client (no babel) -->
  <script src="data.js"></script>
  <script src="api.js"></script>

  <!-- babel modules: order matters -->
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="layout.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="screens_landing.jsx"></script>
  <script type="text/babel" src="screens_dashboard.jsx"></script>
  <script type="text/babel" src="screens_agenda.jsx"></script>
  <script type="text/babel" src="screens_patients.jsx"></script>
  <script type="text/babel" src="screens_exams.jsx"></script>
  <script type="text/babel" src="screens_catalog.jsx"></script>
  <script type="text/babel" src="screens_design.jsx"></script>
  <script type="text/babel" src="screens_settings.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script type="text/babel" data-presets="react">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    function Boot() {
      const [ready, setReady] = React.useState(!!window.OdontotechApp);
      React.useEffect(() => {
        if (window.OdontotechApp) { setReady(true); return; }
        const id = setInterval(() => { if (window.OdontotechApp) { setReady(true); clearInterval(id); } }, 30);
        return () => clearInterval(id);
      }, []);
      return ready ? React.createElement(window.OdontotechApp) : null;
    }
    root.render(React.createElement(Boot));
  </script>
</body>
</html>
